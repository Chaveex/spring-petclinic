name: "Docker Message action"
description: "Une action docker qui génère et affiche un message personnalisé"
inputs:
  message:
    description: "Le message à afficher"
    required: true
outputs:
  output-message:
    description: "Le message de sortie généré par l'action"
runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.message }}